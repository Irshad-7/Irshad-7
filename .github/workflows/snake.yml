name: generate animation

on:
  # Har 24 ghante mein automatically update hoga
  schedule:
    - cron: "0 */24 * * *" 
  
  # Manually run karne ka option
  workflow_dispatch:
  
  # Jab bhi master/main branch mein kuch push hoga tab chalega
  push:
    branches:
    - master
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Snake generate karne ka step
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # YAHAN CHANGE KIYA HAI: v3.1.0 ki jagah v4 kar diya hai
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
